---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: nifiparameterproviders.nifi.controlnifi.io
spec:
  group: nifi.controlnifi.io
  names:
    kind: NiFiParameterProvider
    listKind: NiFiParameterProviderList
    plural: nifiparameterproviders
    singular: nifiparameterprovider
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              NiFiParameterProviderSpec declares a NiFi parameter provider: a controller-level extension that
              sources parameter values from outside NiFi (environment variables, files on disk, a cloud secret
              manager, ...) so sensitive parameters can be managed and rotated externally. The operator creates
              and configures the provider over NiFi's REST API. A parameter provider is passive configuration —
              it has no run state; fetching its parameter groups and applying them to a parameter context is a
              separate action (see docs/parameter-providers.md).
            properties:
              adoptionPolicy:
                properties:
                  mode:
                    default: Never
                    enum:
                    - Never
                    - IfExists
                    - AdoptById
                    - AdoptByName
                    type: string
                  nifiId:
                    type: string
                  requireAnnotation:
                    type: boolean
                  reviewBeforeMutate:
                    type: boolean
                type: object
              bundle:
                description: |-
                  Bundle pins the NAR bundle that supplies Type; omit it to let NiFi resolve a single
                  matching bundle.
                properties:
                  artifact:
                    type: string
                  group:
                    type: string
                  version:
                    type: string
                type: object
              clusterRef:
                properties:
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              deletionPolicy:
                default: Orphan
                enum:
                - Delete
                - Orphan
                type: string
              driftPolicy:
                properties:
                  ignoreFields:
                    items:
                      type: string
                    type: array
                  mode:
                    default: Warn
                    enum:
                    - Ignore
                    - Warn
                    - Reconcile
                    - Fail
                    type: string
                type: object
              properties:
                additionalProperties:
                  type: string
                description: Properties are the provider's non-sensitive properties.
                type: object
              reconciliation:
                properties:
                  paused:
                    type: boolean
                type: object
              sensitiveProperties:
                additionalProperties:
                  properties:
                    secretKeyRef:
                      properties:
                        key:
                          description: The key of the secret to select from.  Must
                            be a valid secret key.
                          type: string
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                        optional:
                          description: Specify whether the Secret or its key must
                            be defined
                          type: boolean
                      required:
                      - key
                      type: object
                      x-kubernetes-map-type: atomic
                  type: object
                description: |-
                  SensitiveProperties are provider properties whose values come from Kubernetes Secrets (for
                  example an access key for a cloud secret manager), so they stay out of the resource itself.
                type: object
              type:
                description: |-
                  Type is the fully qualified provider class, for example
                  "org.apache.nifi.parameter.EnvironmentVariableParameterProvider".
                minLength: 1
                type: string
            required:
            - clusterRef
            - type
            type: object
          status:
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              dependencies:
                properties:
                  ready:
                    type: boolean
                  waitingFor:
                    items:
                      type: string
                    type: array
                type: object
              drift:
                properties:
                  differences:
                    items:
                      type: string
                    type: array
                  lastDetectedTime:
                    format: date-time
                    type: string
                  status:
                    type: string
                type: object
              nifiId:
                type: string
              observedGeneration:
                format: int64
                type: integer
              ready:
                type: boolean
              revision:
                properties:
                  clientId:
                    type: string
                  version:
                    format: int64
                    type: integer
                type: object
              sync:
                properties:
                  lastAttemptTime:
                    format: date-time
                    type: string
                  lastError:
                    type: string
                  lastSuccessfulTime:
                    format: date-time
                    type: string
                type: object
              validationStatus:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
