apiVersion: apps/v1
kind: Deployment
metadata:
  name: nificontrol-controller-manager
  namespace: nificontrol-system
  labels:
    app.kubernetes.io/name: nificontrol
    app.kubernetes.io/component: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nificontrol
      app.kubernetes.io/component: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nificontrol
        app.kubernetes.io/component: controller-manager
    spec:
      serviceAccountName: nificontrol-controller-manager
      containers:
        - name: manager
          image: ghcr.io/michaelhutchings-napier/nificontrol:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

