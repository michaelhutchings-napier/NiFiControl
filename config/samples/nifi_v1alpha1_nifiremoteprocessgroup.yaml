apiVersion: nifi.controlnifi.io/v1alpha1
kind: NiFiRemoteProcessGroup
metadata:
  name: central-nifi
spec:
  clusterRef:
    name: edge
  # Omit parentProcessGroupRef (or set root: true) to attach to the root canvas.
  parentProcessGroupRef:
    name: payments
  # NiFi stores the list as a single comma-separated value and tries the URIs in order.
  targetUris:
    - https://central-nifi.example.com:8443/nifi
  # RAW uses NiFi's site-to-site socket protocol; HTTP tunnels it over the HTTP(S) port.
  transportProtocol: HTTP
  communicationsTimeout: 30 sec
  yieldDuration: 10 sec
  position:
    x: 400
    # "y" must be quoted: YAML 1.1 parses the bare key y as the boolean true.
    "y": 240
  # Configure and turn on the remote ports discovered from the target, by name. A port only
  # transmits once it is connected — wire a NiFiConnection to it with a RemoteInputPort or
  # RemoteOutputPort endpoint (see nifi_v1alpha1_nificonnection.yaml). Discovered ports (and their
  # ids) are published under status.discoveredInputPorts / status.discoveredOutputPorts.
  inputPorts:
    - name: from-edge
      transmitting: true
      concurrentTasks: 2
      useCompression: true
      # batchCount: 1000
      # batchSize: 5 MB
      # batchDuration: 5 sec
  # outputPorts:
  #   - {name: to-edge, transmitting: true}
  # Optional HTTP proxy for site-to-site (HTTP transport). The password is read from a Secret.
  # proxy:
  #   host: proxy.example.com
  #   port: 3128
  #   user: nifi
  #   passwordSecretRef:
  #     name: rpg-proxy
  #     key: password
  # Take over a remote process group that already exists in NiFi instead of creating one:
  # adoptionPolicy:
  #   mode: AdoptById
  #   nifiId: <existing-remote-process-group-id>
  deletionPolicy: Orphan
