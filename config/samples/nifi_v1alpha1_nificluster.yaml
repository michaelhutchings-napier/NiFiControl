apiVersion: nifi.controlnifi.io/v1alpha1
kind: NiFiCluster
metadata:
  name: production
spec:
  mode: Internal
  image: apache/nifi:2.10.0
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
  storage:
    enabled: true
    size: 10Gi
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  jvm:
    heapInitial: 1g
    heapMax: 2g
  deletionPolicy: Delete
  driftPolicy:
    mode: Reconcile
