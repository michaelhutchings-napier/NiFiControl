apiVersion: nifi.controlnifi.io/v1alpha1
kind: NiFiFlowDeployment
metadata:
  name: payments-prod
spec:
  clusterRef:
    name: production
  source:
    bundleRef:
      name: payments
    version: 1.0.0
  target:
    parentProcessGroupRef:
      root: true
    processGroupName: payments-release
  parameterContextRef:
    name: payments-prod
  rollout:
    strategy: StopAllThenApply
    # Gate the rollout on the deployed flow being healthy before it is marked in sync.
    readiness:
      requireValidComponents: true
      requireEnabledControllerServices: true
      maxUnavailable: 0
      timeoutSeconds: 300
    # Drain queues before StopAllThenApply stops the group for replacement.
    queuePolicy:
      enabled: true
      timeoutSeconds: 60
      onTimeout: Fail
    # Re-attempt a failed rollout before falling back to rollback.
    retry:
      maxRetries: 2
    # Set to true to abort an in-flight rollout.
    cancel: false
  rollback:
    enabled: true
    onFailure: PreviousSuccessful
    historyLimit: 5
  ownership:
    mode: Managed
    prune: true
  driftPolicy:
    mode: Warn
