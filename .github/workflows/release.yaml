name: Release

# Pushing a semver tag (vX.Y.Z) builds and publishes the operator image and the Helm charts to
# GHCR, and creates a GitHub Release with the packaged charts attached. Image, chart version, and
# chart appVersion are all set to the tag, so an install pulls a matching, pinned image.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/nificontrol
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  charts:
    name: Package & push Helm charts
    runs-on: ubuntu-latest
    needs: image
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Install yq
        # The chart-image-tag pin below uses yq. ubuntu-latest currently ships yq, but that is an
        # undocumented dependency on the runner image; install it explicitly so the release does not
        # silently break if the image changes.
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Resolve version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Sync chart CRDs
        run: make helm-sync-crds
      - name: Pin the operator chart image tag to this release
        run: yq -i '.image.tag = "${{ steps.version.outputs.value }}"' charts/nificontrol/values.yaml
      - name: Package charts
        run: |
          mkdir -p dist
          helm package charts/nificontrol \
            --version "${{ steps.version.outputs.value }}" \
            --app-version "${{ steps.version.outputs.value }}" -d dist
          helm package charts/nifi-cluster \
            --version "${{ steps.version.outputs.value }}" -d dist
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push charts to GHCR
        run: |
          for chart in dist/*.tgz; do
            helm push "$chart" "oci://ghcr.io/${{ github.repository_owner }}/charts"
          done
      - name: Create GitHub Release with chart artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz
          generate_release_notes: true
