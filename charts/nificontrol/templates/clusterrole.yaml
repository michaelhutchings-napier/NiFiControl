{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nificontrol.clusterRoleName" . }}
  labels:
    {{- include "nificontrol.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - apps
    resources:
      - statefulsets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # cert-manager resources for operator-managed internal TLS (internalTLS). cert-manager
  # itself must be installed separately; this chart never installs it.
  - apiGroups:
      - cert-manager.io
    resources:
      - certificates
      - issuers
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - cert-manager.io
    resources:
      - clusterissuers
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - nifi.controlnifi.io
    resources:
      - nificlusters
      - nificonnections
      - nificontrollerservices
      - nififlowbundles
      - nififlowdeployments
      - nififunnels
      - nifiinputports
      - nifilabels
      - nifioutputports
      - nifiparametercontexts
      - nifiprocessgroups
      - nifiprocessors
      - nifiregistryclients
      - nifireportingtasks
      - nifiusergroups
      - nifiusers
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - nifi.controlnifi.io
    resources:
      - nificlusters/finalizers
      - nificonnections/finalizers
      - nificontrollerservices/finalizers
      - nififlowbundles/finalizers
      - nififlowdeployments/finalizers
      - nififunnels/finalizers
      - nifiinputports/finalizers
      - nifilabels/finalizers
      - nifioutputports/finalizers
      - nifiparametercontexts/finalizers
      - nifiprocessgroups/finalizers
      - nifiprocessors/finalizers
      - nifiregistryclients/finalizers
      - nifireportingtasks/finalizers
      - nifiusergroups/finalizers
      - nifiusers/finalizers
    verbs:
      - update
  - apiGroups:
      - nifi.controlnifi.io
    resources:
      - nificlusters/status
      - nificonnections/status
      - nificontrollerservices/status
      - nififlowbundles/status
      - nififlowdeployments/status
      - nififunnels/status
      - nifiinputports/status
      - nifilabels/status
      - nifioutputports/status
      - nifiparametercontexts/status
      - nifiprocessgroups/status
      - nifiprocessors/status
      - nifiregistryclients/status
      - nifireportingtasks/status
      - nifiusergroups/status
      - nifiusers/status
    verbs:
      - get
      - patch
      - update
{{- end }}
