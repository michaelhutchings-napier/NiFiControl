{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nificontrol.clusterRoleName" . }}
  labels:
    {{- include "nificontrol.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
      - serviceaccounts
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Kubernetes coordination mode: the operator provisions the NiFi pods' Role/RoleBinding
  # granting Lease + ConfigMap access (it already holds those below, so it can grant them).
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - rolebindings
      - roles
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - apps
    resources:
      - statefulsets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - policy
    resources:
      - poddisruptionbudgets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  # Prometheus Operator ServiceMonitor for operator-rendered NiFi metrics scraping. The
  # Prometheus Operator CRDs must be installed separately; this chart never installs them.
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - servicemonitors
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # cert-manager resources for operator-managed internal TLS (internalTLS). cert-manager
  # itself must be installed separately; this chart never installs it.
  - apiGroups:
      - cert-manager.io
    resources:
      - certificates
      - issuers
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - cert-manager.io
    resources:
      - clusterissuers
    verbs:
      - get
      - list
      - watch
  # HorizontalPodAutoscaler and KEDA ScaledObject the operator renders for NiFiAutoscaler.
  # KEDA must be installed separately; this chart never installs it.
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - keda.sh
    resources:
      - scaledobjects
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - nifi.controlnifi.io
    resources:
      - nifiautoscalers
      - nifibackups
      - nificlusters
      - nificonnections
      - nificontrollerservices
      - nififlowbundles
      - nififlowdeployments
      - nififunnels
      - nifiinputports
      - nifilabels
      - nifinodegroups
      - nifioutputports
      - nifiparametercontexts
      - nifipolicies
      - nifiprocessgroups
      - nifiprocessors
      - nifiregistryclients
      - nifiremoteprocessgroups
      - nifireportingtasks
      - nifirestores
      - nifiusergroups
      - nifiusers
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - nifi.controlnifi.io
    resources:
      - nifiautoscalers/finalizers
      - nifibackups/finalizers
      - nificlusters/finalizers
      - nificonnections/finalizers
      - nificontrollerservices/finalizers
      - nififlowbundles/finalizers
      - nififlowdeployments/finalizers
      - nififunnels/finalizers
      - nifiinputports/finalizers
      - nifilabels/finalizers
      - nifinodegroups/finalizers
      - nifioutputports/finalizers
      - nifiparametercontexts/finalizers
      - nifipolicies/finalizers
      - nifiprocessgroups/finalizers
      - nifiprocessors/finalizers
      - nifiregistryclients/finalizers
      - nifiremoteprocessgroups/finalizers
      - nifireportingtasks/finalizers
      - nifirestores/finalizers
      - nifiusergroups/finalizers
      - nifiusers/finalizers
    verbs:
      - update
  - apiGroups:
      - nifi.controlnifi.io
    resources:
      - nifiautoscalers/status
      - nifibackups/status
      - nificlusters/status
      - nificonnections/status
      - nificontrollerservices/status
      - nififlowbundles/status
      - nififlowdeployments/status
      - nififunnels/status
      - nifiinputports/status
      - nifilabels/status
      - nifinodegroups/status
      - nifioutputports/status
      - nifiparametercontexts/status
      - nifipolicies/status
      - nifiprocessgroups/status
      - nifiprocessors/status
      - nifiregistryclients/status
      - nifiremoteprocessgroups/status
      - nifireportingtasks/status
      - nifirestores/status
      - nifiusergroups/status
      - nifiusers/status
    verbs:
      - get
      - patch
      - update
{{- end }}
