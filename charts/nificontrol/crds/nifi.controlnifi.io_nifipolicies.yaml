      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              NiFiPolicySpec declares grants on a NiFi access policy: a (resource, action) tuple granted to a
              set of user and user-group tenants. Access policies exist only on a secured NiFi with a managed
              authorizer. The granted tenants are referenced as NiFiUser / NiFiUserGroup resources so the
              operator can resolve their NiFi tenant ids. The operator preserves unrelated tenants already
              present on the same NiFi access policy.
            properties:
              action:
                description: Action is the access type granted.
                enum:
                - read
                - write
                type: string
              adoptionPolicy:
                properties:
                  mode:
                    default: Never
                    enum:
                    - Never
                    - IfExists
                    - AdoptById
                    - AdoptByName
                    type: string
                  nifiId:
                    type: string
                  requireAnnotation:
                    type: boolean
                  reviewBeforeMutate:
                    type: boolean
                type: object
              clusterRef:
                properties:
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              deletionPolicy:
                default: Orphan
                enum:
                - Delete
                - Orphan
                type: string
              driftPolicy:
                properties:
                  ignoreFields:
                    items:
                      type: string
                    type: array
                  mode:
                    default: Warn
                    enum:
                    - Ignore
                    - Warn
                    - Reconcile
                    - Fail
                    type: string
                type: object
              reconciliation:
                properties:
                  paused:
                    type: boolean
                type: object
              resource:
                description: |-
                  Resource is the NiFi resource the policy applies to, for example "/flow", "/controller",
                  "/proxy", "/data/process-groups/{id}", "/policies", or "/tenants". It must start with "/".
                minLength: 1
                pattern: ^/
                type: string
              userGroupRefs:
                description: UserGroupRefs grants the policy to these NiFiUserGroup
                  tenants.
                items:
                  properties:
                    name:
                      minLength: 1
                      type: string
                    namespace:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              userRefs:
                description: |-
                  UserRefs grants the policy to these NiFiUser tenants (by resource name in this namespace
                  unless a namespace is set on the ref).
                items:
                  properties:
                    name:
                      minLength: 1
                      type: string
                    namespace:
                      type: string
                  required:
                  - name
                  type: object
                type: array
            required:
            - action
            - clusterRef
            - resource
            type: object
          status:
            description: NiFiPolicyStatus reports the resolved policy state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
