    controller-gen.kubebuilder.io/version: v0.16.5
  name: nifipolicies.nifi.controlnifi.io
spec:
  group: nifi.controlnifi.io
  names:
    kind: NiFiPolicy
    listKind: NiFiPolicyList
    plural: nifipolicies
    singular: nifipolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef.name
      name: Cluster
      type: string
