                    format: date-time
                    type: string
                  lastError:
                    type: string
                  lastSuccessfulTime:
                    format: date-time
                    type: string
                type: object
              userGroupIds:
                description: UserGroupIDs are the resolved user-group tenant ids granted
                  the policy.
                items:
                  type: string
                type: array
              userIds:
                description: UserIDs are the resolved user tenant ids granted the
                  policy.
                items:
                  type: string
                type: array
            type: object
