                          "<backup-name>-flow".
                        type: string
                      type:
                        default: ConfigMap
                        description: Type is the object kind used to store the snapshot.
                        enum:
                        - ConfigMap
                        - Secret
                        type: string
                    type: object
                type: object
              targetProcessGroupId:
                description: |-
                  TargetProcessGroupID is the process group to restore into. When empty the root process
                  group is targeted.
                type: string
            required:
