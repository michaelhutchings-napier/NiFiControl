              observedGeneration:
                format: int64
                type: integer
              phase:
                description: Phase is Pending, Succeeded, or Failed.
                type: string
              ready:
                type: boolean
              restoredProcessGroupId:
                description: |-
                  RestoredProcessGroupID is the process group that received the snapshot (the new child
                  group for Import, or the target group for Replace).
                type: string
              revision:
                properties:
                  clientId:
                    type: string
                  version:
                    format: int64
                    type: integer
                type: object
              sync:
                properties:
                  lastAttemptTime:
                    format: date-time
                    type: string
                  lastError:
