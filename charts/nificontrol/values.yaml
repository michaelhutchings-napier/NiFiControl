replicaCount: 1

image:
  repository: ghcr.io/michaelhutchings-napier/nificontrol
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automountServiceAccountToken: true
  annotations: {}
  name: ""

rbac:
  create: true

leaderElection:
  enabled: true
  # Leader-election timing (only used when enabled). The defaults match controller-runtime's own;
  # raise them on slow or contended API servers to avoid spurious leadership loss. Durations are
  # Go duration strings (e.g. 30s, 1m). Must satisfy leaseDuration > renewDeadline > retryPeriod.
  leaseDuration: 15s
  renewDeadline: 10s
  retryPeriod: 2s

# Namespaces the operator watches. Empty (the default) watches all namespaces (cluster-scoped).
# Set to a list, e.g. [team-a, team-b], to run the operator namespace-scoped — it then reconciles
# only resources in those namespaces. RBAC stays a ClusterRole because a few resources the operator
# reads are cluster-scoped (e.g. CSI drivers); scope with your own Roles if you need tighter RBAC.
watchNamespaces: []

metrics:
  bindAddress: ":8080"
  port: 8080
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    annotations: {}
  # Prometheus Operator ServiceMonitor for the operator's own controller-runtime metrics.
  # Requires the Prometheus Operator CRDs (monitoring.coreos.com) and metrics.service.enabled.
  serviceMonitor:
    enabled: false
    path: /metrics
    interval: ""        # e.g. 30s; empty uses the Prometheus default
    scrapeTimeout: ""    # e.g. 10s; empty uses the Prometheus default
    # Extra labels so a Prometheus instance's serviceMonitorSelector can select it.
    labels: {}

healthProbe:
  bindAddress: ":8081"
  port: 8081
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 1
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

revisionHistoryLimit: 10
terminationGracePeriodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""

extraArgs: []
extraEnv: []

podDisruptionBudget:
  enabled: false
  minAvailable: 1
