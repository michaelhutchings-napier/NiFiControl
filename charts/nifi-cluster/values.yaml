nameOverride: ""
fullnameOverride: ""

image:
  repository: apache/nifi
  tag: 2.10.0
  pullPolicy: IfNotPresent

replicas: 1

# maxTimerDrivenThreadCount sets NiFi's controller-level maximum timer-driven thread count
# (applied through the NiFi API once the cluster is reachable, and enforced declaratively).
# Leave 0 to keep NiFi's default.
maxTimerDrivenThreadCount: 0

service:
  type: ClusterIP
  port: 8080
  nodePort: 0
  annotations: {}

# ports customizes the network ports NiFi binds. Unset (0/omitted) fields keep NiFi's
# defaults. The HTTPS web port is set through internalTLS.httpsPort, not here.
ports: {}
  # http: 8080            # plaintext web port (non-TLS mode)
  # clusterProtocol: 11443 # node-to-node cluster protocol port
  # remoteInput: 10000    # site-to-site raw socket port
  # loadBalance: 6342     # cluster connection load-balance port

# externalServices provisions additional Services in front of the node pods beyond the
# operator's own ClusterIP and headless Services (for example a LoadBalancer for the UI).
externalServices: []
  # - name: nifi-lb
  #   type: LoadBalancer
  #   annotations: {}
  #   ports:
  #     - name: https
  #       port: 8443
  #       targetPort: web   # named container port: web, cluster, s2s, load-balance
  #   # loadBalancerSourceRanges: ["10.0.0.0/8"]
  #   # externalTrafficPolicy: Local

# additionalProxyHosts adds extra host[:port] entries to NiFi's proxy allow-list, on top
# of the Service DNS names and any Ingress host the operator adds automatically (additive;
# it never replaces the computed entries).
additionalProxyHosts: []
  # - nifi.example.com
  # - nifi.example.com:8443

# clusterDomain is the Kubernetes cluster DNS domain used to build the fully-qualified
# Service names in the node TLS certificate SANs and the computed proxy-host allow-list.
# Leave empty to use the default (cluster.local); set it for a non-default DNS domain.
clusterDomain: ""

storage:
  enabled: true
  size: 10Gi
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  # Place individual NiFi repositories on dedicated PersistentVolumes (flowfile,
  # content, provenance, database). Repositories without an entry stay on the main
  # data volume; an unset storageClassName inherits the main volume's class. Adding
  # or removing an entry on an existing cluster recreates the StatefulSet and the
  # affected repository starts empty on its new volume — drain queues first.
  repositories: {}
    # content:
    #   size: 100Gi
    #   storageClassName: bulk
    # provenance:
    #   size: 50Gi

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

jvm:
  heapInitial: 1g
  heapMax: 2g

# Pod placement controls for the managed NiFi nodes.
scheduling:
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  # Add a required pod anti-affinity so no two NiFi nodes of this cluster share a Kubernetes
  # node (hardware isolation / higher availability). Needs at least as many schedulable nodes
  # as replicas, or the excess pods stay Pending. Merges with any affinity set above.
  oneNifiNodePerNode: false

# Keep a minimum number of NiFi nodes available during voluntary disruptions.
podDisruptionBudget:
  enabled: false
  # Set only one of maxUnavailable or minAvailable.
  maxUnavailable: 1
  minAvailable: null

# Expose the cluster through an Ingress and configure NiFi's allowed proxy host.
ingress:
  enabled: false
  ingressClassName: ""
  host: ""
  path: /
  pathType: Prefix
  contextPath: ""
  annotations: {}
  tls:
    secretName: ""
    hosts: []

# Control how NiFi version changes roll out across the StatefulSet.
upgrade:
  strategy: RollingUpdate   # RollingUpdate | OnDelete
  partition: null
  minReadySeconds: 0

# Gracefully offload NiFi nodes through the cluster API before their pods are removed
# when replicas is reduced.
scaleDown:
  offloadData: true
  timeoutSeconds: 600
  onTimeout: Fail           # Fail | Force

# Required when replicas is greater than one. NiFiControl does not provision
# ZooKeeper in this first managed-cluster release.
coordination:
  # How a clustered NiFi (replicas > 1) coordinates: "ZooKeeper" (external ensemble) or
  # "Kubernetes" (native Lease-based leader election + a ConfigMap state provider, no
  # ZooKeeper — the operator provisions the Lease/ConfigMap RBAC for the node pods).
  mode: ZooKeeper
  # Required for replicas > 1 in ZooKeeper mode; ignored in Kubernetes mode.
  zookeeperConnectString: ""
  zookeeperRootNode: /nifi
  electionMaxWait: 2 mins
  # Kubernetes mode only: namespaces the Leases/state ConfigMaps so multiple clusters can
  # share a namespace. Defaults to the cluster's resource name when empty.
  leasePrefix: ""

# Override the internal service endpoint, for example when an ingress is used.
api:
  uri: ""
  timeout: ""

# Operator-managed HTTPS and mutual TLS. Requires cert-manager to be installed in the
# cluster; this chart never installs cert-manager itself. Select exactly one provider:
# selfSigned (operator-managed two-stage CA), issuerRef (existing Issuer/ClusterIssuer),
# or external (externally supplied PKCS12 Secrets).
internalTLS:
  enabled: false
  httpsPort: 8443
  # Operator-managed two-stage self-signed CA chain (used when enabled and neither
  # issuerRef.name nor external.serverSecretName is set).
  selfSigned:
    caCommonName: ""
    caDuration: 8760h
  # Reference an existing cert-manager Issuer or ClusterIssuer.
  issuerRef:
    name: ""
    kind: Issuer
    group: cert-manager.io
  # Consume externally supplied TLS Secrets. Required keys: keystore.p12,
  # truststore.p12, tls.crt, tls.key. Optional key: ca.crt.
  external:
    serverSecretName: ""
    clientSecretName: ""
    keystorePasswordSecretRef:
      name: ""
      key: password
    initialAdminIdentity: ""
    nodeIdentity: ""
  # Leaf-certificate tuning for selfSigned / issuerRef modes.
  certificate:
    duration: 2160h
    renewBefore: 360h
    additionalServerSANs: []
    operatorCommonName: ""
    nodeCommonName: ""
  # SSL-context auto-reload: when enabled, NiFi rescans the mounted keystore/truststore and
  # reloads them in place, so a rotated leaf certificate is picked up WITHOUT restarting the
  # nodes (the operator stops rolling the StatefulSet on leaf rotation). A CA change still
  # rolls the pods. Leave disabled to roll the nodes on every certificate change.
  autoReload:
    enabled: false
    interval: "10 secs"   # NiFi duration: e.g. "10 secs", "500 ms", "5 mins"

# Prometheus metrics. NiFi 2.x always serves Prometheus-format metrics from its REST API
# at /nifi-api/flow/metrics/prometheus on the web port, so enabling metrics only controls
# whether the operator renders a Prometheus Operator ServiceMonitor. The Prometheus
# Operator CRDs must be installed; otherwise the cluster reports MetricsReady=False
# (CRDsNotInstalled) and continues. On a TLS cluster the scrape uses the operator-managed
# client certificate and the scrape identity needs NiFi read authorization.
metrics:
  enabled: false
  path: /nifi-api/flow/metrics/prometheus
  serviceMonitor:
    enabled: false
    interval: ""        # e.g. 30s; empty uses the Prometheus default
    scrapeTimeout: ""    # e.g. 10s; empty uses the Prometheus default
    # Extra labels so a Prometheus instance's serviceMonitorSelector can select it.
    labels: {}
    # Disable TLS verification when scraping a TLS cluster (development only).
    insecureSkipVerify: false

additionalEnv: []

# Raw configuration entries merged into the nodes' nifi.properties / bootstrap.conf at
# startup, after the operator-managed settings, so an override wins over the shipped
# default. Removing an entry restores the NiFi image's default on the next rollout.
# Keys the operator manages (web listener, TLS keystores, sensitive properties key,
# cluster/ZooKeeper wiring, heap arguments) are rejected; use the dedicated fields.
configOverrides:
  nifiProperties: {}
    # nifi.queue.swap.threshold: "15000"
    # nifi.content.repository.archive.max.retention.period: "3 days"
  # Merge nifi.properties entries from Secrets (data keys are property names) for
  # values that must not appear in this file, e.g. an LDAP manager password. Secrets
  # merge in list order; inline nifiProperties entries win. The denylist is enforced
  # when the cluster reconciles.
  nifiPropertiesFrom: []
    # - name: nifi-extra-properties
  bootstrapProperties: {}
    # java.arg.debug: -XX:+PrintFlagsFinal
  # Replaces conf/logback.xml wholesale (custom log levels, appenders, retention).
  # Removing it restores the image's shipped logback.xml on the next rollout. For the
  # common cases, prefer the dedicated `logging:` section below (mutually exclusive with
  # this) — it overlays your settings onto NiFi's default logback so its noise suppression
  # is kept. Use this escape hatch for custom appenders, syslog, and the like.
  logbackXml: ""

# Node logging (conf/logback.xml) for the common cases, without hand-writing logback XML.
# The operator overlays these onto NiFi's default logback, so the deprecation log, the
# user-vs-app log split, and the ZooKeeper/Spring/Jetty noise suppression are preserved —
# raising the level to DEBUG stays useful instead of unleashing a firehose. Omit the whole
# block (leave it commented) to keep the image default. Mutually exclusive with
# configOverrides.logbackXml.
logging: {}
  # level: INFO            # root level: TRACE | DEBUG | INFO | WARN | ERROR | OFF
  # # Per-logger levels for targeted troubleshooting without raising the whole app.
  # loggers:
  #   org.apache.nifi.web.security: DEBUG
  #   org.apache.nifi.controller.repository: WARN
  # console: false         # also send nifi-app.log to stdout so `kubectl logs` shows it
  # # Bound nifi-app.log on disk (other log files keep the image defaults).
  # retention:
  #   maxFileSize: 100MB
  #   maxHistory: 30       # rolled archives kept
  #   totalSizeCap: 3GB

# Customize the generated NiFi node pods beyond the dedicated fields above. Operator-
# managed metadata wins on conflicts; the volume names data / nificontrol-* and the
# container names nifi / initialize-data are reserved.
pod:
  labels: {}
  annotations: {}
  imagePullSecrets: []      # e.g. [{name: regcred}]
  serviceAccountName: ""
  # Pod-level security context. Replaces the operator default, except fsGroup falls back
  # to 1000 (the apache/nifi image's uid/gid) when unset so volumes stay writable.
  securityContext: {}
    # runAsNonRoot: true
    # seccompProfile: {type: RuntimeDefault}
    # fsGroup: 1000
  # Container-level security context for the operator's own containers (NiFi + the
  # initialize-data init container), for a restricted Pod Security Admission namespace.
  # The set below works with the stock apache/nifi image. Do NOT add
  # readOnlyRootFilesystem: true without also mounting writable emptyDir volumes over
  # NiFi's writable paths (logs, work, run, nar_extensions, nificontrol-truststores) via
  # extraVolumes/extraVolumeMounts — NiFi writes there and will crash otherwise.
  containerSecurityContext: {}
    # allowPrivilegeEscalation: false
    # capabilities: {drop: [ALL]}
  # OpenShift: name of a SecurityContextConstraints to grant the node pods' ServiceAccount.
  # The default restricted-v2 SCC rejects the fixed uid/gid 1000 the apache/nifi image needs;
  # set this to "nonroot-v2" so the operator grants that SCC (it admits any non-root uid). The
  # operator provisions a ServiceAccount and a Role/RoleBinding granting 'use'. Leave empty off
  # OpenShift.
  openShiftSCC: ""   # e.g. nonroot-v2
  # How long Kubernetes waits after SIGTERM before force-killing a node pod. NiFi needs
  # time to stop gracefully (checkpoint the flowfile repo, flush content/provenance repos).
  # Defaults to 60s when unset (Kubernetes' own default is only 30). Keep it above the NiFi
  # bootstrap's graceful.shutdown.seconds (20); raise it for large backlogs or node offload.
  terminationGracePeriodSeconds: null   # e.g. 120
  # Tune the operator's startup/liveness/readiness probes for the NiFi container. The probe
  # actions stay operator-managed; only these scheduling fields are adjustable. Widen the
  # startup probe for flows that take minutes to boot. Any field left unset keeps the default
  # (startup: period 10s, failureThreshold 60 ≈ 10-min boot window; liveness: period 20s,
  # failureThreshold 3; readiness: period 10s, failureThreshold 3).
  probes: {}
    # startup:
    #   periodSeconds: 15
    #   failureThreshold: 120   # ≈ 30-minute boot window for very large flows
    # liveness:
    #   periodSeconds: 30
    #   failureThreshold: 5
    # readiness:
    #   periodSeconds: 15
    #   timeoutSeconds: 8
  # Extra /etc/hosts entries for the node pods — e.g. an LDAP or OIDC endpoint not served by
  # cluster DNS. Each entry: {ip: <addr>, hostnames: [<name>, ...]}.
  hostAliases: []
    # - ip: 10.9.8.7
    #   hostnames: [ldap.internal.example.com, oidc.internal.example.com]
  # Pod DNS policy: ClusterFirst (default), ClusterFirstWithHostNet, Default, or None.
  # Use None together with dnsConfig for fully custom resolution.
  dnsPolicy: null   # e.g. None
  # Supplement (or, with dnsPolicy None, provide) the pod DNS settings for private DNS zones.
  dnsConfig: {}
    # nameservers: [10.9.8.53]
    # searches: [internal.example.com]
    # options:
    #   - {name: ndots, value: "2"}
  # Appended to the pod volumes / NiFi container mounts — e.g. custom NAR extensions
  # or JDBC drivers at /opt/nifi/nifi-current/nar_extensions.
  extraVolumes: []
  extraVolumeMounts: []
  # Extra init containers (run after the operator's data initializer) and sidecars.
  extraInitContainers: []
  extraContainers: []

# User authentication for a secured cluster (requires internalTLS.enabled). The
# operator always keeps its own mutual-TLS access; the mode below only controls how
# people log in. Set mode to SingleUser, LDAP, or OIDC and fill in the matching block.
# adminIdentities are granted the full administrative policy set automatically.
authentication:
  mode: ""
  adminIdentities: []
    # - alice@example.com
  singleUser:
    # Secret with keys "username" and "password" (12+ characters).
    credentialsSecretRef: {name: ""}
  ldap:
    url: ""                      # e.g. ldap://openldap.auth.svc:389
    authenticationStrategy: SIMPLE   # SIMPLE | LDAPS | START_TLS
    managerDN: ""
    managerPasswordSecretRef: {name: "", key: password}
    userSearchBase: ""
    userSearchFilter: ""         # e.g. (uid={0})
    identityStrategy: USE_USERNAME   # USE_USERNAME | USE_DN
    # For LDAPS/START_TLS against a directory signed by a private CA, point at a Secret
    # holding the PEM CA bundle; the operator builds it into NiFi's truststore.
    caSecretRef: {}              # e.g. {name: corp-ca, key: ca.crt}
  oidc:
    discoveryURL: ""             # .../.well-known/openid-configuration
    clientID: ""
    clientSecretRef: {name: "", key: password}
    claim: email
    additionalScopes: []
    # For an identity provider whose HTTPS cert is signed by a private CA, point at a
    # Secret holding the PEM CA bundle; NiFi trusts only the JDK CA bundle without it.
    caSecretRef: {}              # e.g. {name: corp-ca, key: ca.crt}

deletionPolicy: Delete
driftPolicy:
  mode: Reconcile

# =============================================================================================
# Optional resources stamped out alongside this cluster, so ONE `helm install` brings up the
# cluster together with its parameter contexts, users, flows, and so on — instead of applying
# each as a separate CR. Every list defaults to [] (cluster-only); uncomment the examples to
# add resources.
#
#   * Each entry is {name, spec, [annotations], [labels]}, where `spec` is the CR spec verbatim
#     (see the matching config/samples/nifi_v1alpha1_*.yaml or the CRD for all fields).
#   * `clusterRef` is filled in with THIS cluster automatically, so you never repeat it — except
#     for flowBundles (cluster-agnostic content) and autoscalers (explicit target).
#   * The operator reconciles asynchronously, so ordering does not matter: a flowDeployment that
#     references a flowBundle / parameterContext defined below just waits until they exist.
#
# The examples below form one coherent "payments" app that references itself across kinds.
# ---------------------------------------------------------------------------------------------

# --- Parameters -----------------------------------------------------------------------------
parameterContexts: []
  # - name: payments-prod
  #   spec:
  #     description: Payments production parameters
  #     parameters:
  #       - {name: kafka.bootstrap.servers, value: kafka:9092}
  #       # Sensitive values come from a Secret, never inline:
  #       - name: db.password
  #         sensitiveValueFrom: {secretKeyRef: {name: payments-db, key: password}}

# --- Controller services --------------------------------------------------------------------
controllerServices: []
  # - name: payments-dbcp
  #   spec:
  #     parentProcessGroupRef: {root: true}
  #     type: org.apache.nifi.dbcp.DBCPConnectionPool
  #     properties:
  #       Database Connection URL: jdbc:postgresql://postgres/payments
  #     sensitiveProperties:
  #       Password: {secretKeyRef: {name: payments-db, key: password}}
  #     state: Enabled

# --- Flow registry --------------------------------------------------------------------------
registryClients: []
  # - name: shared-registry
  #   spec:
  #     type: NiFiRegistry              # or GitHub
  #     uri: https://registry.example.com/nifi-registry
  #     description: Shared flow registry

# --- Flows: a versioned bundle deployed into the cluster ------------------------------------
flowBundles: []          # NiFiFlowBundle — cluster-agnostic flow content, so NO clusterRef
  # - name: payments
  #   spec:
  #     version: "1.0.0"
  #     source:
  #       snapshot:
  #         flowContents:
  #           identifier: payments-flow
  #           name: payments
  #           processors: []            # see config/samples/nifi_v1alpha1_nififlowbundle.yaml
  #           connections: []           # for a full inline flow, or pull a signed OCI artifact
  #     # Alternatively pull a cosign-signed OCI artifact instead of an inline snapshot:
  #     # source:
  #     #   oci:
  #     #     image: registry.example.com/flows/payments:v1
  #     #     path: flow.json
  #     #     verify: {cosignPublicKeySecretRef: {name: cosign-key, key: cosign.pub}}

flowDeployments: []
  # - name: payments-prod
  #   spec:
  #     source: {bundleRef: {name: payments}, version: "1.0.0"}
  #     target: {parentProcessGroupRef: {root: true}, processGroupName: payments-release}
  #     parameterContextRef: {name: payments-prod}
  #     rollout:
  #       strategy: StopAllThenApply
  #       readiness: {requireValidComponents: true, requireEnabledControllerServices: true, timeoutSeconds: 300}
  #     rollback: {enabled: true, onFailure: PreviousSuccessful, historyLimit: 5}
  #     ownership: {mode: Managed, prune: true}
  #     driftPolicy: {mode: Warn}

# A directly-managed process group, as an alternative to a versioned flowDeployment:
processGroups: []
  # - name: payments
  #   spec:
  #     displayName: Payments
  #     parameterContextRef: {name: payments-prod}

# --- Users, groups, and access policies -----------------------------------------------------
users: []
  # - name: alice
  #   spec:
  #     identity: alice@example.com     # OIDC identity or client-certificate DN
  #     # Optionally have the operator issue a client certificate into a Secret:
  #     # certificate: {create: true, secretName: alice-nifi-client}

userGroups: []
  # - name: operators
  #   spec:
  #     identity: operators
  #     users:
  #       - userRef: {name: alice}

policies: []
  # - name: operators-write-payments
  #   spec:
  #     resource: /flow                 # e.g. /flow, /controller, /proxy, /data/process-groups/{id}
  #     action: write                   # read | write
  #     userGroupRefs:
  #       - name: operators
  #     # or grant individual users:
  #     # userRefs: [{name: alice}]

# --- Reporting tasks ------------------------------------------------------------------------
reportingTasks: []
  # - name: s2s-status
  #   spec:
  #     type: org.apache.nifi.reporting.SiteToSiteStatusReportingTask
  #     scheduling: {strategy: TIMER_DRIVEN, period: 1 min}
  #     properties: {Destination URL: "https://nifi.example.com:8443", Input Port Name: status-in, Platform: nifi}
  #     state: Enabled

# --- Extra node pools and autoscaling -------------------------------------------------------
nodeGroups: []
  # - name: workers
  #   spec:
  #     replicas: 2                     # a second tier joining this cluster; unset fields inherit
  #     jvm: {heapInitial: 4g, heapMax: 6g}
  #     resources: {requests: {cpu: "2", memory: 8Gi}}
  #     scheduling: {nodeSelector: {workload: nifi-workers}}

autoscalers: []          # NiFiAutoscaler — references its target explicitly, so NO clusterRef
  # - name: payments
  #   spec:
  #     target: {kind: NiFiCluster, name: payments}   # name must match this cluster / a nodeGroup
  #     minReplicas: 3
  #     maxReplicas: 9
  #     metrics:
  #       - type: Prometheus
  #         prometheus:
  #           serverAddress: http://prometheus.monitoring.svc:9090
  #           query: sum(nifi_amount_items_queued)
  #           threshold: "10000"

# --- Site-to-site (remote process groups) ---------------------------------------------------
remoteProcessGroups: []
  # - name: to-central
  #   spec:
  #     targetUris: [https://central-nifi.example.com:8443/nifi]
  #     transportProtocol: HTTP         # HTTP | RAW
  #     parentProcessGroupRef: {root: true}

# --- Backup / restore of the flow -----------------------------------------------------------
backups: []
  # - name: nightly
  #   spec:
  #     processGroupId: ""              # empty = the whole flow (root process group)
  #     storage: {type: ConfigMap}      # ConfigMap | Secret
restores: []
  # See config/samples/nifi_v1alpha1_nifirestore.yaml for the spec.

# --- Individual flow components ---------------------------------------------------------------
# These are first-class CRs too, but you normally author them inside a flowBundle's flowContents
# rather than one-by-one here. Uncomment and populate from config/samples/ if you do need them.
processors: []
connections: []
funnels: []
inputPorts: []
outputPorts: []
labels: []
