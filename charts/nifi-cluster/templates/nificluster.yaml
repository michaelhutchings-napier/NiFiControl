apiVersion: nifi.controlnifi.io/v1alpha1
kind: NiFiCluster
metadata:
  name: {{ include "nifi-cluster.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nifi-cluster.labels" . | nindent 4 }}
spec:
  mode: Internal
  image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
  imagePullPolicy: {{ .Values.image.pullPolicy }}
  replicas: {{ .Values.replicas }}
  {{- if gt (int .Values.maxTimerDrivenThreadCount) 0 }}
  maxTimerDrivenThreadCount: {{ .Values.maxTimerDrivenThreadCount }}
  {{- end }}
  service:
    type: {{ .Values.service.type }}
    port: {{ .Values.service.port }}
    {{- if gt (int .Values.service.nodePort) 0 }}
    nodePort: {{ .Values.service.nodePort }}
    {{- end }}
    {{- with .Values.service.annotations }}
    annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- with .Values.ports }}
  ports:
    {{- with .http }}
    http: {{ . }}
    {{- end }}
    {{- with .clusterProtocol }}
    clusterProtocol: {{ . }}
    {{- end }}
    {{- with .remoteInput }}
    remoteInput: {{ . }}
    {{- end }}
    {{- with .loadBalance }}
    loadBalance: {{ . }}
    {{- end }}
  {{- end }}
  {{- with .Values.externalServices }}
  externalServices:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.additionalProxyHosts }}
  additionalProxyHosts:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.clusterDomain }}
  clusterDomain: {{ . | quote }}
  {{- end }}
  storage:
    enabled: {{ .Values.storage.enabled }}
    size: {{ .Values.storage.size }}
    {{- with .Values.storage.storageClassName }}
    storageClassName: {{ . | quote }}
    {{- end }}
    accessModes:
      {{- toYaml .Values.storage.accessModes | nindent 6 }}
    {{- with .Values.storage.repositories }}
    repositories:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  resources:
    {{- toYaml .Values.resources | nindent 4 }}
  jvm:
    heapInitial: {{ .Values.jvm.heapInitial | quote }}
    heapMax: {{ .Values.jvm.heapMax | quote }}
  {{- if or .Values.scheduling.nodeSelector .Values.scheduling.tolerations .Values.scheduling.affinity .Values.scheduling.topologySpreadConstraints .Values.scheduling.priorityClassName .Values.scheduling.oneNifiNodePerNode }}
  scheduling:
    {{- with .Values.scheduling.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.scheduling.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.scheduling.affinity }}
    affinity:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.scheduling.topologySpreadConstraints }}
    topologySpreadConstraints:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.scheduling.priorityClassName }}
    priorityClassName: {{ . | quote }}
    {{- end }}
    {{- if .Values.scheduling.oneNifiNodePerNode }}
    oneNifiNodePerNode: true
    {{- end }}
  {{- end }}
  {{- if .Values.podDisruptionBudget.enabled }}
  podDisruptionBudget:
    enabled: true
    {{- if .Values.podDisruptionBudget.minAvailable }}
    minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
    {{- else if .Values.podDisruptionBudget.maxUnavailable }}
    maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable }}
    {{- end }}
  {{- end }}
  {{- if .Values.ingress.enabled }}
  ingress:
    enabled: true
    host: {{ .Values.ingress.host | quote }}
    path: {{ .Values.ingress.path | quote }}
    pathType: {{ .Values.ingress.pathType }}
    {{- with .Values.ingress.ingressClassName }}
    ingressClassName: {{ . | quote }}
    {{- end }}
    {{- with .Values.ingress.contextPath }}
    contextPath: {{ . | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.ingress.tls.secretName }}
    tls:
      secretName: {{ . | quote }}
      {{- with $.Values.ingress.tls.hosts }}
      hosts:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
  {{- end }}
  upgrade:
    strategy: {{ .Values.upgrade.strategy }}
    minReadySeconds: {{ .Values.upgrade.minReadySeconds }}
    {{- if ne (toString .Values.upgrade.partition) "<nil>" }}
    partition: {{ .Values.upgrade.partition }}
    {{- end }}
  scaleDown:
    offloadData: {{ .Values.scaleDown.offloadData }}
    timeoutSeconds: {{ .Values.scaleDown.timeoutSeconds }}
    onTimeout: {{ .Values.scaleDown.onTimeout }}
  {{- if or .Values.coordination.zookeeperConnectString (eq .Values.coordination.mode "Kubernetes") }}
  coordination:
    {{- with .Values.coordination.mode }}
    mode: {{ . }}
    {{- end }}
    {{- with .Values.coordination.zookeeperConnectString }}
    zookeeperConnectString: {{ . | quote }}
    {{- end }}
    zookeeperRootNode: {{ .Values.coordination.zookeeperRootNode | quote }}
    electionMaxWait: {{ .Values.coordination.electionMaxWait | quote }}
    {{- with .Values.coordination.leasePrefix }}
    leasePrefix: {{ . | quote }}
    {{- end }}
  {{- end }}
  {{- with .Values.api.uri }}
  api:
    uri: {{ . | quote }}
    {{- with $.Values.api.timeout }}
    timeout: {{ . | quote }}
    {{- end }}
  {{- end }}
  {{- if .Values.internalTLS.enabled }}
  internalTLS:
    enabled: true
    httpsPort: {{ .Values.internalTLS.httpsPort }}
    {{- if .Values.internalTLS.external.serverSecretName }}
    external:
      serverSecretName: {{ .Values.internalTLS.external.serverSecretName | quote }}
      clientSecretName: {{ .Values.internalTLS.external.clientSecretName | quote }}
      keystorePasswordSecretRef:
        name: {{ .Values.internalTLS.external.keystorePasswordSecretRef.name | quote }}
        key: {{ .Values.internalTLS.external.keystorePasswordSecretRef.key | quote }}
      initialAdminIdentity: {{ .Values.internalTLS.external.initialAdminIdentity | quote }}
      nodeIdentity: {{ .Values.internalTLS.external.nodeIdentity | quote }}
    {{- else if .Values.internalTLS.issuerRef.name }}
    issuerRef:
      name: {{ .Values.internalTLS.issuerRef.name | quote }}
      kind: {{ .Values.internalTLS.issuerRef.kind }}
      group: {{ .Values.internalTLS.issuerRef.group }}
    {{- else }}
    selfSigned:
      {{- with .Values.internalTLS.selfSigned.caCommonName }}
      caCommonName: {{ . | quote }}
      {{- end }}
      caDuration: {{ .Values.internalTLS.selfSigned.caDuration | quote }}
    {{- end }}
    {{- if not .Values.internalTLS.external.serverSecretName }}
    certificate:
      duration: {{ .Values.internalTLS.certificate.duration | quote }}
      renewBefore: {{ .Values.internalTLS.certificate.renewBefore | quote }}
      {{- with .Values.internalTLS.certificate.additionalServerSANs }}
      additionalServerSANs:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.internalTLS.certificate.operatorCommonName }}
      operatorCommonName: {{ . | quote }}
      {{- end }}
      {{- with .Values.internalTLS.certificate.nodeCommonName }}
      nodeCommonName: {{ . | quote }}
      {{- end }}
    {{- end }}
    {{- if .Values.internalTLS.autoReload.enabled }}
    autoReload:
      enabled: true
      {{- with .Values.internalTLS.autoReload.interval }}
      interval: {{ . | quote }}
      {{- end }}
    {{- end }}
    {{- if .Values.internalTLS.perNodeCertificates.enabled }}
    perNodeCertificates:
      enabled: true
    {{- end }}
  {{- end }}
  {{- if .Values.metrics.enabled }}
  metrics:
    enabled: true
    {{- with .Values.metrics.path }}
    path: {{ . | quote }}
    {{- end }}
    {{- if .Values.metrics.serviceMonitor.enabled }}
    serviceMonitor:
      enabled: true
      {{- with .Values.metrics.serviceMonitor.interval }}
      interval: {{ . | quote }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ . | quote }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.labels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.metrics.serviceMonitor.insecureSkipVerify }}
      insecureSkipVerify: true
      {{- end }}
    {{- end }}
  {{- end }}
  {{- with .Values.additionalEnv }}
  additionalEnv:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if or .Values.configOverrides.nifiProperties .Values.configOverrides.nifiPropertiesFrom .Values.configOverrides.bootstrapProperties .Values.configOverrides.logbackXml }}
  configOverrides:
    {{- with .Values.configOverrides.nifiProperties }}
    nifiProperties:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.configOverrides.nifiPropertiesFrom }}
    nifiPropertiesFrom:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.configOverrides.bootstrapProperties }}
    bootstrapProperties:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.configOverrides.logbackXml }}
    logbackXml: {{ . | quote }}
    {{- end }}
  {{- end }}
  {{- with .Values.logging }}
  logging:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if or .Values.pod.labels .Values.pod.annotations .Values.pod.imagePullSecrets .Values.pod.serviceAccountName .Values.pod.securityContext .Values.pod.containerSecurityContext .Values.pod.openShiftSCC (not (kindIs "invalid" .Values.pod.terminationGracePeriodSeconds)) .Values.pod.probes .Values.pod.hostAliases .Values.pod.dnsPolicy .Values.pod.dnsConfig .Values.pod.extraVolumes .Values.pod.extraVolumeMounts .Values.pod.extraInitContainers .Values.pod.extraContainers }}
  pod:
    {{- with .Values.pod.labels }}
    labels:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.pod.securityContext }}
    securityContext:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.pod.containerSecurityContext }}
    containerSecurityContext:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.pod.openShiftSCC }}
    openShiftSCC: {{ . | quote }}
    {{- end }}
    {{- with .Values.pod.annotations }}
    annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.pod.imagePullSecrets }}
    imagePullSecrets:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.pod.serviceAccountName }}
    serviceAccountName: {{ . | quote }}
    {{- end }}
    {{- if not (kindIs "invalid" .Values.pod.terminationGracePeriodSeconds) }}
    terminationGracePeriodSeconds: {{ .Values.pod.terminationGracePeriodSeconds }}
    {{- end }}
    {{- with .Values.pod.probes }}
    probes:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.pod.hostAliases }}
    hostAliases:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.pod.dnsPolicy }}
    dnsPolicy: {{ . }}
    {{- end }}
    {{- with .Values.pod.dnsConfig }}
    dnsConfig:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.pod.extraVolumes }}
    extraVolumes:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.pod.extraVolumeMounts }}
    extraVolumeMounts:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.pod.extraInitContainers }}
    extraInitContainers:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.pod.extraContainers }}
    extraContainers:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  {{- if .Values.authentication.mode }}
  authentication:
    mode: {{ .Values.authentication.mode }}
    {{- with .Values.authentication.adminIdentities }}
    adminIdentities:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if eq .Values.authentication.mode "SingleUser" }}
    singleUser:
      credentialsSecretRef:
        name: {{ .Values.authentication.singleUser.credentialsSecretRef.name | quote }}
    {{- else if eq .Values.authentication.mode "LDAP" }}
    ldap:
      url: {{ .Values.authentication.ldap.url | quote }}
      authenticationStrategy: {{ .Values.authentication.ldap.authenticationStrategy }}
      managerDN: {{ .Values.authentication.ldap.managerDN | quote }}
      managerPasswordSecretRef:
        name: {{ .Values.authentication.ldap.managerPasswordSecretRef.name | quote }}
        key: {{ .Values.authentication.ldap.managerPasswordSecretRef.key | quote }}
      userSearchBase: {{ .Values.authentication.ldap.userSearchBase | quote }}
      userSearchFilter: {{ .Values.authentication.ldap.userSearchFilter | quote }}
      identityStrategy: {{ .Values.authentication.ldap.identityStrategy }}
      {{- with .Values.authentication.ldap.caSecretRef.name }}
      caSecretRef:
        name: {{ . | quote }}
        {{- with $.Values.authentication.ldap.caSecretRef.key }}
        key: {{ . | quote }}
        {{- end }}
      {{- end }}
    {{- else if eq .Values.authentication.mode "OIDC" }}
    oidc:
      discoveryURL: {{ .Values.authentication.oidc.discoveryURL | quote }}
      clientID: {{ .Values.authentication.oidc.clientID | quote }}
      clientSecretRef:
        name: {{ .Values.authentication.oidc.clientSecretRef.name | quote }}
        key: {{ .Values.authentication.oidc.clientSecretRef.key | quote }}
      claim: {{ .Values.authentication.oidc.claim | quote }}
      {{- with .Values.authentication.oidc.additionalScopes }}
      additionalScopes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.authentication.oidc.caSecretRef.name }}
      caSecretRef:
        name: {{ . | quote }}
        {{- with $.Values.authentication.oidc.caSecretRef.key }}
        key: {{ . | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
  {{- end }}
  deletionPolicy: {{ .Values.deletionPolicy }}
  driftPolicy:
    mode: {{ .Values.driftPolicy.mode }}
