apiVersion: nifi.controlnifi.io/v1alpha1
kind: NiFiCluster
metadata:
  name: {{ include "nifi-cluster.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nifi-cluster.labels" . | nindent 4 }}
spec:
  mode: Internal
  image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
  imagePullPolicy: {{ .Values.image.pullPolicy }}
  replicas: {{ .Values.replicas }}
  service:
    type: {{ .Values.service.type }}
    port: {{ .Values.service.port }}
    {{- if gt (int .Values.service.nodePort) 0 }}
    nodePort: {{ .Values.service.nodePort }}
    {{- end }}
    {{- with .Values.service.annotations }}
    annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  storage:
    enabled: {{ .Values.storage.enabled }}
    size: {{ .Values.storage.size }}
    {{- with .Values.storage.storageClassName }}
    storageClassName: {{ . | quote }}
    {{- end }}
    accessModes:
      {{- toYaml .Values.storage.accessModes | nindent 6 }}
  resources:
    {{- toYaml .Values.resources | nindent 4 }}
  jvm:
    heapInitial: {{ .Values.jvm.heapInitial | quote }}
    heapMax: {{ .Values.jvm.heapMax | quote }}
  {{- with .Values.coordination.zookeeperConnectString }}
  coordination:
    zookeeperConnectString: {{ . | quote }}
    zookeeperRootNode: {{ $.Values.coordination.zookeeperRootNode | quote }}
    electionMaxWait: {{ $.Values.coordination.electionMaxWait | quote }}
  {{- end }}
  {{- with .Values.api.uri }}
  api:
    uri: {{ . | quote }}
    {{- with $.Values.api.timeout }}
    timeout: {{ . | quote }}
    {{- end }}
  {{- end }}
  {{- if .Values.internalTLS.enabled }}
  internalTLS:
    enabled: true
    httpsPort: {{ .Values.internalTLS.httpsPort }}
    {{- if .Values.internalTLS.external.serverSecretName }}
    external:
      serverSecretName: {{ .Values.internalTLS.external.serverSecretName | quote }}
      clientSecretName: {{ .Values.internalTLS.external.clientSecretName | quote }}
      keystorePasswordSecretRef:
        name: {{ .Values.internalTLS.external.keystorePasswordSecretRef.name | quote }}
        key: {{ .Values.internalTLS.external.keystorePasswordSecretRef.key | quote }}
      initialAdminIdentity: {{ .Values.internalTLS.external.initialAdminIdentity | quote }}
      nodeIdentity: {{ .Values.internalTLS.external.nodeIdentity | quote }}
    {{- else if .Values.internalTLS.issuerRef.name }}
    issuerRef:
      name: {{ .Values.internalTLS.issuerRef.name | quote }}
      kind: {{ .Values.internalTLS.issuerRef.kind }}
      group: {{ .Values.internalTLS.issuerRef.group }}
    {{- else }}
    selfSigned:
      {{- with .Values.internalTLS.selfSigned.caCommonName }}
      caCommonName: {{ . | quote }}
      {{- end }}
      caDuration: {{ .Values.internalTLS.selfSigned.caDuration | quote }}
    {{- end }}
    {{- if not .Values.internalTLS.external.serverSecretName }}
    certificate:
      duration: {{ .Values.internalTLS.certificate.duration | quote }}
      renewBefore: {{ .Values.internalTLS.certificate.renewBefore | quote }}
      {{- with .Values.internalTLS.certificate.additionalServerSANs }}
      additionalServerSANs:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.internalTLS.certificate.operatorCommonName }}
      operatorCommonName: {{ . | quote }}
      {{- end }}
      {{- with .Values.internalTLS.certificate.nodeCommonName }}
      nodeCommonName: {{ . | quote }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- with .Values.additionalEnv }}
  additionalEnv:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  deletionPolicy: {{ .Values.deletionPolicy }}
  driftPolicy:
    mode: {{ .Values.driftPolicy.mode }}
